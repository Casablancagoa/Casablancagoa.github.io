<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Haven Hotel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="hero">
        <nav class="navbar">
            <div class="container">
                <a href="#" class="logo">
                    <img src="images/logo.png" alt="Hotel Logo">
                </a>
                <ul class="nav-links">
                    <li><a href="#rooms">Rooms</a></li>
                    <li><a href="#amenities">Amenities</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>
        <div class="hero-content">
            <h1>Experience Luxury Redefined</h1>
            <a href="#booking" class="btn-book">Book Now</a>
        </div>
    </header>

    <!-- Booking Form -->
    <section id="booking" class="booking-form">
        <div class="container">
            <h2>Make a Reservation</h2>
            <form>
                <div class="form-group">
                    <input type="date" id="check-in" required>
                    <input type="date" id="check-out" required>
                </div>
                <div class="form-group">
                    <select id="guests" required>
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                    </select>
                    <button type="submit">Check Availability</button>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2023 Luxury Haven Hotel. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
